name: ci

# Data-independent CI: locks in the per-script selftests and the Nextflow DAG
# wiring (-stub-run) for both pipelines. No real data / containers required.
on:
  push:
  pull_request:

jobs:
  selftests:
    name: python selftests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet numpy scipy pysam
      - run: bash bin/run_selftests.sh

  stub-run:
    name: nextflow stub-run (wiring)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
      - name: Generate dummy stub fixtures
        run: |
          mkdir -p ci/ref ci/cache/homo_sapiens
          # stub blocks only touch outputs, so empty placeholder inputs suffice
          touch ci/ref/genome.fa ci/ref/genome.fa.fai ci/ref/genome.dict
          touch ci/ref/genome.fa.0123 ci/ref/genome.fa.amb ci/ref/genome.fa.ann ci/ref/genome.fa.bwt.2bit.64 ci/ref/genome.fa.pac
          touch ci/ref/snps.vcf.gz ci/ref/snps.vcf.gz.tbi
          touch ci/ref/panel.vcf ci/ref/panel.bed ci/ref/background.tsv
          printf 'DNMT3A\nTET2\n' > ci/ref/chip.txt
          touch ci/r1.fastq.gz ci/r2.fastq.gz
          printf 'patient,timepoint,fastq_1,fastq_2\nP1,T0,ci/r1.fastq.gz,ci/r2.fastq.gz\n' > ci/cfdna.csv
          printf 'patient,tumor_fastq_1,tumor_fastq_2,normal_fastq_1,normal_fastq_2\nP1,ci/r1.fastq.gz,ci/r2.fastq.gz,ci/r1.fastq.gz,ci/r2.fastq.gz\n' > ci/wes.csv
      - name: Pipeline B (mrd_monitor) stub
        run: |
          nextflow run main.nf -stub-run --workflow mrd_monitor \
            --input ci/cfdna.csv \
            --fasta ci/ref/genome.fa --fasta_dict ci/ref/genome.dict \
            --panel_vcf ci/ref/panel.vcf --panel_bed ci/ref/panel.bed \
            --background ci/ref/background.tsv
      - name: Pipeline A (panel_design) stub
        run: |
          nextflow run main.nf -stub-run --workflow panel_design \
            --input ci/wes.csv \
            --fasta ci/ref/genome.fa --fasta_fai ci/ref/genome.fa.fai \
            --fasta_dict ci/ref/genome.dict \
            --snp_vcf ci/ref/snps.vcf.gz --chip_blocklist ci/ref/chip.txt \
            --vep_cache ci/cache
